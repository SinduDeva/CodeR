# =============================================================================
# CodeR — Code Reviewer & Impact Analyzer
# Configuration file (.code-reviewer.properties)
# =============================================================================
# Place this file in the root of your repository.
# Every property has a sensible default; only override what you need.
# =============================================================================


# -----------------------------------------------------------------------------
# LANGUAGE
# -----------------------------------------------------------------------------
# The primary language of this project.
# The tool picks up only staged files for this language and runs only the
# relevant rules — nothing else is analysed.
#
# Supported values: java | python
primary.language=java


# -----------------------------------------------------------------------------
# VERSION
# (Only needed for the language set above)
# -----------------------------------------------------------------------------
# java.source.version — gates version-specific Java rules.
#   e.g. the instanceof pattern-matching hint only fires for Java 16+.
#   Common values: 8, 11, 17, 21
java.source.version=17

# spring.boot.version — major version of Spring Boot used in the project.
#   Gates Spring-version-specific rules, e.g. flagging javax.* imports as
#   a MUST_FIX when running on Spring Boot 3 (which requires jakarta.*).
#   Accepts both a major number (3) and a full semver string (3.2.5 or 2.7.3).
spring.boot.version=2.7.3


# -----------------------------------------------------------------------------
# ANALYSIS BEHAVIOUR
# -----------------------------------------------------------------------------
# Block the git commit when any MUST_FIX finding is present.
block.on.must.fix=false

# Analyse only lines that were actually changed in the staged diff (recommended).
# Set to false to scan the entire file instead.
only.changed.lines=true

# When a changed line sits inside a method, expand analysis to cover the full
# method body. Useful for catching issues introduced by surrounding context.
expand.changed.scope.to.method=false

# Stricter severity escalations for Java rules.
# When true, string == / != comparisons are flagged (normally skipped as noise).
strict.java=true

# Stricter severity escalations for Spring Boot rules.
# When true, bare @CrossOrigin and ResponseEntity<?> findings are escalated
# from CONSIDER / SHOULD_FIX to MUST_FIX / SHOULD_FIX respectively.
strict.spring=false

# Enable or disable impact analysis entirely (Java only).
# When false, no transitive call graph, endpoint discovery, or dependency mapping
# is performed, and the Impact Analysis section is omitted from the report.
# Only code quality findings are shown.
enable.impact.analysis=true


# -----------------------------------------------------------------------------
# IMPACT ANALYSIS  (Java only)
# -----------------------------------------------------------------------------
# Trace callers transitively through the dependency graph (BFS) to discover
# which API endpoints are affected by changes in utility / service classes.
enable.transitive.api.discovery=true

# How many hops to follow. A 3-hop chain (util → service → controller) needs
# at least depth 4 to reach the controller; 6 gives comfortable headroom.
transitive.api.discovery.max.depth=6

# Cap on files visited per analysis run — keeps commit-time overhead predictable.
# Increase if your service layer is very wide.
transitive.api.discovery.max.visited.files=30

# Maximum number of impacted controllers to report per changed file.
transitive.api.discovery.max.controllers=5

# Whether to trace structural callers (any call on the target type) in addition
# to direct method-name matches. Finds more callers but may surface false
# positives through delegate or chained-call patterns. Off by default.
transitive.caller.structural.fallback=true

# When structural fallback is on, use JavaParser AST for precise detection
# instead of regex. Requires javaparser-core.jar on the classpath.
use.ast.caller.detection=true

# Whether to include Java symbol / class-level impact analysis.
enable.structural.impact=true


# -----------------------------------------------------------------------------
# DEPENDENCY GRAPH  (Java only)
# -----------------------------------------------------------------------------
# Show only files proven to call a changed method (true, recommended).
# Set to false for a broader class-level dependency view.
dependency.graph.scope.method=false

# How long the on-disk graph cache stays valid (hours).
# 12 h covers a normal working day; lower this if you do heavy refactoring
# within the same day and want the cache refreshed more often.
graph.cache.ttl.hours=12

# Force a full cache rebuild on the next run, then automatically resets to false.
# You can also pass --rebuild-graph on the command line instead.
rebuild.graph.cache=true


# -----------------------------------------------------------------------------
# PMD STATIC ANALYSIS  (Java only, optional)
# -----------------------------------------------------------------------------
# Run PMD alongside the built-in rules.  Requires PMD to be installed.
enable.pmd.analysis=false
pmd.path=C:/dev-tools/code-reviewer/pmd-temp/pmd-bin-7.20.0/bin/pmd.bat
pmd.ruleset.path=config/pmd/changelens-ruleset.xml


# -----------------------------------------------------------------------------
# OPENAPI / SWAGGER  (Java only, optional)
# -----------------------------------------------------------------------------
# Comma-separated paths to OpenAPI spec files, relative to the repo root.
# Supports exact paths, glob patterns, and multiple entries:
#   apispec/service.yml
#   apispec/*.yml
#   **/openapi/*.yaml
#   apispec/*.yml,src/main/resources/swagger/*.yaml
#
# Leave blank to enable auto-discovery: the tool scans common locations
# (apispec/, openapi/, swagger/, src/main/resources/, docs/) automatically.
openapi.spec.paths=

# Suffix used by your OpenAPI code generator for delegate interfaces.
# Default matches the openapi-generator Spring convention (*ApiDelegate).
openapi.delegate.suffix=ApiDelegate


# -----------------------------------------------------------------------------
# RULE CATEGORIES
# Disable entire rule categories to reduce noise for projects that don't use
# certain technologies (e.g. set enable.rules.soap=false for REST-only projects).
# All categories are enabled by default.
# -----------------------------------------------------------------------------
enable.rules.spring.boot=true
enable.rules.soap=true
enable.rules.grpc=true
enable.rules.outbound.client=true
enable.rules.scheduled=true


# -----------------------------------------------------------------------------
# REPORT
# -----------------------------------------------------------------------------
# Open the generated HTML report in the browser automatically after each run.
open.report=true

# Show which test files relate to each changed file in the report.
show.testing.scope=false


# -----------------------------------------------------------------------------
# DEBUG
# -----------------------------------------------------------------------------
# Print detailed internal logging (staged files, impact graph steps, timings).
# Turn off in normal day-to-day use.
debug=true
